<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Thury Group Kft.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F5F5F4;
    --brand: #294D7B;
    --muted: #888888;
    --ink: #292929;
    --line: rgba(41, 41, 41, 0.08);
    --danger: #B23A48;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  .serif { font-family: 'Newsreader', 'Times New Roman', serif; font-weight: 500; }

  /* Top bar */
  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--line);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .left { display: flex; align-items: center; gap: 0.85rem; }
  .topbar img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: block; }
  .topbar .title { font-family: 'Newsreader', serif; font-weight: 600; font-size: 1.25rem; letter-spacing: -0.02em; }
  .topbar .badge {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--brand);
    border: 1px solid rgba(41, 77, 123, 0.25);
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    margin-left: 0.5rem;
  }
  .topbar .right { display: flex; align-items: center; gap: 1rem; }
  .topbar .who { font-size: 0.85rem; color: var(--muted); }
  .topbar a.exit { color: var(--ink); text-decoration: none; font-size: 0.85rem; font-weight: 500; }
  .topbar a.exit:hover { color: var(--brand); }

  /* Login screen */
  .login-wrap {
    min-height: calc(100vh - 73px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .login-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 22px 40px -28px rgba(41, 41, 41, 0.18);
  }
  .login-card h2 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 1.85rem;
    margin: 0 0 0.4rem;
    letter-spacing: -0.02em;
  }
  .login-card .sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 1.75rem;
  }

  /* Form controls */
  .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  .field label {
    font-size: 0.8rem;
    color: var(--ink);
    font-weight: 500;
  }
  .field input[type="email"],
  .field input[type="password"],
  .field input[type="text"],
  .field input[type="number"],
  .field textarea {
    font: inherit;
    color: var(--ink);
    background: #fafafa;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    outline: none;
    transition: border-color 180ms ease, background-color 180ms ease;
    width: 100%;
  }
  .field textarea { min-height: 80px; resize: vertical; }
  .field input:focus, .field textarea:focus {
    border-color: var(--brand);
    background: #fff;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    padding: 0.7rem 1.25rem;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 999px;
    font: 500 0.875rem/1 'Inter', sans-serif;
    cursor: pointer;
    text-decoration: none;
    transition: transform 200ms ease, background-color 200ms ease;
  }
  .btn:hover:not(:disabled) { transform: scale(1.02); background: #000; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn.brand { background: var(--brand); }
  .btn.brand:hover:not(:disabled) { background: #1B3357; }
  .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost:hover:not(:disabled) { background: #fff; }
  .btn.danger { background: transparent; color: var(--danger); border: 1px solid rgba(178, 58, 72, 0.25); }
  .btn.danger:hover:not(:disabled) { background: rgba(178, 58, 72, 0.06); }
  .btn.sm { padding: 0.4rem 0.85rem; font-size: 0.8rem; }
  .btn.icon { padding: 0.4rem; border-radius: 8px; }
  .btn.icon svg { width: 14px; height: 14px; }

  .alert {
    background: rgba(178, 58, 72, 0.08);
    color: var(--danger);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .alert.show { display: block; }
  .ok {
    background: rgba(41, 77, 123, 0.08);
    color: var(--brand);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .ok.show { display: block; }

  /* App layout */
  .shell { display: none; max-width: 1200px; margin: 0 auto; padding: 2rem; }
  .shell.show { display: block; }

  .tabs {
    display: inline-flex;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.3rem;
    margin-bottom: 2rem;
  }
  .tab {
    border: none;
    background: transparent;
    padding: 0.55rem 1.25rem;
    border-radius: 999px;
    font: 500 0.875rem 'Inter', sans-serif;
    color: var(--ink);
    cursor: pointer;
    transition: background-color 200ms ease, color 200ms ease;
  }
  .tab:hover { color: var(--brand); }
  .tab.active { background: var(--brand); color: #fff; }

  .pane { display: none; }
  .pane.show { display: block; }

  .grid-2 { display: grid; grid-template-columns: 360px 1fr; gap: 1.5rem; align-items: start; }
  @media (max-width: 880px) { .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 1.5rem;
  }
  .card h3 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 1.35rem;
    margin: 0 0 0.25rem;
    letter-spacing: -0.02em;
  }
  .card .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin: 0 0 1.25rem;
  }

  /* Drop zone */
  .drop {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
    padding: 1.5rem;
    border: 1.5px dashed rgba(41, 41, 41, 0.18);
    border-radius: 12px;
    background: #fafafa;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    text-align: center;
    transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease;
  }
  .drop:hover, .drop.drag { border-color: var(--brand); color: var(--brand); background: #fff; }
  .drop input { display: none; }
  .drop .filename { color: var(--ink); font-weight: 500; }
  .preview {
    margin-top: 0.5rem;
    width: 100%;
    aspect-ratio: 4 / 3;
    border-radius: 10px;
    background-size: cover;
    background-position: center;
    background-color: #ececea;
  }

  /* List */
  .list { display: flex; flex-direction: column; gap: 0.75rem; }
  .list-empty {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
    font-size: 0.95rem;
  }
  .row {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 0.75rem;
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 1rem;
    align-items: center;
  }
  .row .thumb {
    width: 90px;
    height: 68px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    background-color: #ececea;
    background-image:
      repeating-linear-gradient(45deg, rgba(41,41,41,0.04) 0 10px, rgba(41,41,41,0.02) 10px 20px);
  }
  .row .meta { min-width: 0; }
  .row .meta .t {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 1.05rem;
    line-height: 1.2;
    margin: 0 0 0.15rem;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row .meta .s {
    color: var(--muted);
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row .actions { display: flex; gap: 0.4rem; }

  .loading {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="left">
      <img src="../assets/logo.png" alt="Logo" />
      <span class="title">Thury Group<span class="badge">Admin</span></span>
    </div>
    <div class="right">
      <span class="who" id="who"></span>
      <a class="exit" href="../index.html">← Vissza az oldalra</a>
      <button id="logoutBtn" class="btn ghost sm" style="display:none">Kijelentkezés</button>
    </div>
  </header>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <h2 class="serif">Bejelentkezés</h2>
      <p class="sub">Adja meg adminisztrátori e-mail címét és jelszavát.</p>
      <div class="alert" id="loginErr"></div>
      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="loginPwd">Jelszó</label>
          <input type="password" id="loginPwd" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn brand" style="width:100%;padding:0.85rem" id="loginBtn">Belépés</button>
      </form>
    </div>
  </div>

  <!-- ADMIN APP -->
  <main class="shell" id="shell">
    <div class="tabs">
      <button class="tab active" data-tab="portfolio">Portfólió</button>
      <button class="tab" data-tab="machines">Gépek</button>
    </div>

    <!-- Portfolio pane -->
    <section class="pane show" id="pane-portfolio">
      <div class="grid-2">
        <div class="card">
          <h3 class="serif">Új projekt hozzáadása</h3>
          <p class="sub">Töltsön fel egy képet és adjon meg egy címet — azonnal megjelenik az oldalon.</p>
          <div class="alert" id="pfErr"></div>
          <div class="ok" id="pfOk"></div>
          <form id="pfForm">
            <div class="field">
              <label for="pfTitle">Cím</label>
              <input type="text" id="pfTitle" required placeholder="pl. Morgan Stanley irodaház" />
            </div>
            <div class="field">
              <label for="pfSub">Alcím (opcionális)</label>
              <input type="text" id="pfSub" placeholder="pl. éves nagytakarítás" />
            </div>
            <div class="field">
              <label>Kép</label>
              <label class="drop" id="pfDrop">
                <input type="file" id="pfFile" accept="image/*" />
                <span>Kattintson vagy dobjon ide egy képet</span>
                <span class="filename" id="pfFileName"></span>
              </label>
              <div class="preview" id="pfPreview" style="display:none"></div>
            </div>
            <button type="submit" class="btn brand" id="pfSubmit" style="width:100%;padding:0.85rem">Hozzáadás</button>
          </form>
        </div>
        <div>
          <div class="list" id="pfList">
            <div class="loading">Betöltés…</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Machines pane -->
    <section class="pane" id="pane-machines">
      <div class="grid-2">
        <div class="card">
          <h3 class="serif">Új gép hozzáadása</h3>
          <p class="sub">Adja meg a gép adatait és töltsön fel egy képet.</p>
          <div class="alert" id="mErr"></div>
          <div class="ok" id="mOk"></div>
          <form id="mForm">
            <div class="field">
              <label for="mName">Név</label>
              <input type="text" id="mName" required placeholder="pl. Nilfisk SC401 súrológép" />
            </div>
            <div class="field">
              <label for="mTag">Címke (opcionális)</label>
              <input type="text" id="mTag" placeholder="pl. Bérelhető / Hamarosan" />
            </div>
            <div class="field">
              <label for="mDesc">Rövid leírás (opcionális)</label>
              <textarea id="mDesc" placeholder="Pár szó a gépről…"></textarea>
            </div>
            <div class="field">
              <label>Kép</label>
              <label class="drop" id="mDrop">
                <input type="file" id="mFile" accept="image/*" />
                <span>Kattintson vagy dobjon ide egy képet</span>
                <span class="filename" id="mFileName"></span>
              </label>
              <div class="preview" id="mPreview" style="display:none"></div>
            </div>
            <button type="submit" class="btn brand" id="mSubmit" style="width:100%;padding:0.85rem">Hozzáadás</button>
          </form>
        </div>
        <div>
          <div class="list" id="mList">
            <div class="loading">Betöltés…</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
